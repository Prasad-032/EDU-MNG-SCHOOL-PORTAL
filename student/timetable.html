<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timetable — EduManage Student</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
  <style>
    :root { --accent:#1E40AF !important; --accent-s:#DBEAFE !important; --accent-h:#1D3588 !important; }
    .bottom-nav { position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;border-top:1px solid var(--border);display:flex !important;z-index:40; }
    .bn-item { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:600;color:var(--gray);text-decoration:none;transition:color 0.2s; }
    .bn-item.active { color:#1E40AF; }
    .bn-item svg { width:20px;height:20px;display:block; }

    /* Day tabs */
    .day-tabs { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
    .day-tab { padding:8px 18px; border-radius:9999px; border:1.5px solid var(--border); background:#fff; font-size:13px; font-weight:700; color:var(--gray); cursor:pointer; transition:all 0.2s; }
    .day-tab:hover { border-color:#1E40AF; color:#1E40AF; }
    .day-tab.active { background:#1E40AF; color:#fff; border-color:#1E40AF; }
    .day-tab.today { border-color:#1E40AF; color:#1E40AF; }

    /* Period cards */
    .period-list { display:flex; flex-direction:column; gap:10px; }
    .period-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 18px; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow-sm); transition:all 0.2s; }
    .period-card:hover { box-shadow:var(--shadow-md); transform:translateX(3px); }
    .period-card.current { border-left:4px solid #1E40AF; background:#EFF6FF; }
    .period-card.free { background:var(--surface); border-style:dashed; }
    .pc-num { width:32px; height:32px; border-radius:50%; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:var(--gray); flex-shrink:0; }
    .period-card.current .pc-num { background:#1E40AF; color:#fff; }
    .pc-color { width:4px; height:44px; border-radius:2px; flex-shrink:0; }
    .pc-subject { font-size:15px; font-weight:800; color:var(--dark); }
    .pc-meta    { font-size:12px; color:var(--gray); margin-top:3px; }
    .pc-time    { margin-left:auto; text-align:right; }
    .pc-time-main { font-size:13px; font-weight:700; color:var(--dark); }
    .pc-time-dur  { font-size:11px; color:var(--gray); margin-top:2px; }
    .pc-now-badge { background:#1E40AF; color:#fff; font-size:9px; font-weight:800; padding:2px 7px; border-radius:9999px; margin-left:8px; }

    /* Weekly grid view */
    .week-grid { display:grid; grid-template-columns:80px repeat(6,1fr); gap:4px; overflow-x:auto; }
    .wg-header { background:var(--surface); border-radius:var(--radius-sm); padding:8px 6px; text-align:center; font-size:11px; font-weight:700; color:var(--gray); }
    .wg-header.today-col { background:#DBEAFE; color:#1E40AF; }
    .wg-time { background:var(--surface); border-radius:var(--radius-sm); padding:8px 6px; text-align:center; font-size:10px; color:var(--gray); font-weight:600; display:flex; align-items:center; justify-content:center; }
    .wg-cell { border-radius:var(--radius-sm); padding:6px 8px; min-height:52px; display:flex; flex-direction:column; justify-content:center; }
    .wg-cell.empty { background:var(--surface); }
    .wg-subject { font-size:11px; font-weight:700; color:#fff; }
    .wg-room    { font-size:9px; color:rgba(255,255,255,0.75); margin-top:2px; }

    .view-toggle { display:flex; gap:6px; margin-bottom:20px; }
    .vt-btn { padding:7px 16px; border-radius:var(--radius-md); border:1.5px solid var(--border); background:#fff; font-size:13px; font-weight:600; color:var(--gray); cursor:pointer; transition:all 0.2s; }
    .vt-btn.active { background:#1E40AF; color:#fff; border-color:#1E40AF; }
  </style>
</head>
<body>
<div class="portal-layout">
  <header class="topbar">
    <a href="dashboard.html" style="display:flex;align-items:center;gap:6px;color:var(--gray);font-size:13px;font-weight:600">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <div class="topbar-logo" style="margin-left:8px"><div class="topbar-logo-icon" style="background:#1E40AF">E</div>Timetable</div>
    <span class="topbar-spacer"></span>
        <div class="user-menu-wrap">
      <img src="https://images.unsplash.com/photo-1529390079861-591de354faf5?w=64&h=64&fit=crop&crop=face" alt="User" class="topbar-avatar" id="portalAvatarBtn" style="cursor:pointer" />
      <div class="user-dropdown" id="portalUserDropdown">
        <div class="ud-header"><div class="ud-name">Raju Sharma</div><div class="ud-role">Student · Class 10A</div></div>
        <a href="dashboard.html" class="ud-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard
        </a>
        <a href="profile.html" class="ud-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile
        </a>
        <a href="../login.html" class="ud-item logout" id="portalLogoutBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </a>
      </div>
    </div>

  </header>

  <div class="page-content">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div>
        <h2 style="font-size:20px;font-weight:800;color:var(--dark)">Class 10A — Weekly Timetable</h2>
        <p style="font-size:13px;color:var(--gray);margin-top:2px">April 2026 · Academic Year 2025–26</p>
      </div>
      <div class="view-toggle">
        <button class="vt-btn active" id="dayViewBtn">Day View</button>
        <button class="vt-btn" id="weekViewBtn">Week View</button>
      </div>
    </div>

    <!-- Day tabs -->
    <div class="day-tabs" id="dayTabs">
      <button class="day-tab" data-day="0">Mon</button>
      <button class="day-tab active today" data-day="1">Tue ✦</button>
      <button class="day-tab" data-day="2">Wed</button>
      <button class="day-tab" data-day="3">Thu</button>
      <button class="day-tab" data-day="4">Fri</button>
      <button class="day-tab" data-day="5">Sat</button>
    </div>

    <!-- Day view -->
    <div id="dayView">
      <div class="period-list" id="periodList"></div>
    </div>

    <!-- Week view (hidden by default) -->
    <div id="weekView" style="display:none">
      <div class="week-grid" id="weekGrid"></div>
    </div>

  </div>

    <nav class="bottom-nav">
    <a href="dashboard.html" class="bn-item "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="attendance.html" class="bn-item "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Attendance</a>
    <a href="grades.html" class="bn-item "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Grades</a>
    <a href="assignments.html" class="bn-item "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Assignments</a>
    <a href="library.html" class="bn-item "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Library</a>
    <a href="fees.html" class="bn-item "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>Fees</a>
  </nav>
</div>
<script>
const subjects = {
  maths:   { name:'Mathematics',     color:'#1E40AF', room:'Room 301', teacher:'Mr. Rajesh Kumar' },
  science: { name:'Science',         color:'#16A34A', room:'Lab 1',    teacher:'Ms. Priya Sharma' },
  english: { name:'English',         color:'#7C3AED', room:'Room 301', teacher:'Mr. Amit Verma' },
  social:  { name:'Social Studies',  color:'#D97706', room:'Room 301', teacher:'Ms. Sunita Nair' },
  cs:      { name:'Computer Science',color:'#0EA5E9', room:'Lab 2',    teacher:'Mr. Amit Sharma' },
  hindi:   { name:'Hindi',           color:'#DC2626', room:'Room 302', teacher:'Ms. Kavya Reddy' },
  pe:      { name:'Physical Ed.',    color:'#16A34A', room:'Ground',   teacher:'Mr. Rohit Singh' },
  free:    { name:'Free Period',     color:'#CBD5E1', room:'—',        teacher:'—' },
};
const times = ['9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM'];
const schedule = [
  ['maths','science','english','free','social','cs','pe'],   // Mon
  ['maths','science','english','free','social','cs','free'], // Tue (today)
  ['hindi','maths','science','free','english','social','cs'],// Wed
  ['cs','hindi','maths','free','science','english','social'],// Thu
  ['social','cs','hindi','free','maths','science','english'],// Fri
  ['pe','maths','science','free','hindi','free','free'],     // Sat
];
let currentDay = 1;

function renderDay(day) {
  const list = document.getElementById('periodList');
  list.innerHTML = '';
  schedule[day].forEach((subKey, i) => {
    const s = subjects[subKey];
    const isCurrent = day === 1 && i === 0;
    const isFree = subKey === 'free';
    list.innerHTML += `
      <div class="period-card ${isCurrent?'current':''} ${isFree?'free':''}">
        <div class="pc-num">${i+1}</div>
        <div class="pc-color" style="background:${s.color}"></div>
        <div style="flex:1">
          <div class="pc-subject">${s.name}${isCurrent?'<span class="pc-now-badge">NOW</span>':''}</div>
          <div class="pc-meta">${s.room} · ${s.teacher}</div>
        </div>
        <div class="pc-time">
          <div class="pc-time-main">${times[i]}</div>
          <div class="pc-time-dur">45 min</div>
        </div>
      </div>`;
  });
}

function renderWeek() {
  const grid = document.getElementById('weekGrid');
  const days = ['Time','Mon','Tue ✦','Wed','Thu','Fri','Sat'];
  grid.innerHTML = days.map((d,i) => `<div class="wg-header ${i===2?'today-col':''}">${d}</div>`).join('');
  times.forEach((t, ti) => {
    grid.innerHTML += `<div class="wg-time">${t}</div>`;
    schedule.forEach(day => {
      const s = subjects[day[ti]];
      const isFree = day[ti] === 'free';
      grid.innerHTML += `<div class="wg-cell ${isFree?'empty':''}" style="${isFree?'':'background:'+s.color}">
        ${isFree ? '' : `<div class="wg-subject">${s.name.split(' ')[0]}</div><div class="wg-room">${s.room}</div>`}
      </div>`;
    });
  });
}

renderDay(currentDay);
renderWeek();

document.querySelectorAll('.day-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentDay = +tab.dataset.day;
    renderDay(currentDay);
  });
});

document.getElementById('dayViewBtn').addEventListener('click', () => {
  document.getElementById('dayView').style.display = 'block';
  document.getElementById('weekView').style.display = 'none';
  document.getElementById('dayViewBtn').classList.add('active');
  document.getElementById('weekViewBtn').classList.remove('active');
});
document.getElementById('weekViewBtn').addEventListener('click', () => {
  document.getElementById('dayView').style.display = 'none';
  document.getElementById('weekView').style.display = 'block';
  document.getElementById('weekViewBtn').classList.add('active');
  document.getElementById('dayViewBtn').classList.remove('active');
});
</script>

<script>
(function(){
  var btn = document.getElementById("portalAvatarBtn");
  var dd  = document.getElementById("portalUserDropdown");
  if(!btn||!dd) return;
  btn.addEventListener("click", function(e){ e.stopPropagation(); dd.classList.toggle("open"); });
  document.addEventListener("click", function(){ dd.classList.remove("open"); });
  var logoutBtn = document.getElementById("portalLogoutBtn");
  if(logoutBtn) logoutBtn.addEventListener("click", function(e){
    e.preventDefault();
    if(confirm("Are you sure you want to log out?")) window.location.href="../login.html";
  });
})();
</script>
</body>
</html>
