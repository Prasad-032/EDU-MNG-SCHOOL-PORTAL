<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — EduManage Parent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
  <style>
    :root { --accent:#D97706; --accent-s:#FEF3C7; --accent-h:#B45309; }

    .msg-layout { display:grid; grid-template-columns:320px 1fr; gap:16px; min-height:calc(100vh - 64px - 80px); }
    .msg-sidebar { background:#fff; border:1px solid var(--border); border-radius:var(--radius-xl); overflow:hidden; display:flex; flex-direction:column; }
    .msg-search { padding:14px 16px; border-bottom:1px solid var(--border); }
    .msg-search input { width:100%; height:38px; padding:0 12px; border:1.5px solid var(--border); border-radius:var(--radius-md); font-size:13px; background:var(--surface); }
    .msg-search input:focus { outline:none; border-color:var(--accent); }
    .msg-contact-list { flex:1; overflow-y:auto; }
    .msg-contact { display:flex; align-items:center; gap:12px; padding:12px 16px; cursor:pointer; border-bottom:1px solid var(--border); transition:background 0.15s; }
    .msg-contact:hover { background:var(--surface); }
    .msg-contact.active { background:var(--accent-s); }
    .mc-avatar { width:42px; height:42px; border-radius:50%; object-fit:cover; flex-shrink:0; }
    .mc-info { flex:1; min-width:0; }
    .mc-name { font-size:14px; font-weight:700; color:var(--dark); }
    .mc-sub { font-size:12px; color:var(--gray); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mc-meta { text-align:right; flex-shrink:0; }
    .mc-time { font-size:11px; color:var(--light); }
    .mc-unread { width:8px; height:8px; background:var(--accent); border-radius:50%; margin-top:4px; margin-left:auto; }
    .msg-empty-sidebar { padding:24px; text-align:center; color:var(--gray); font-size:13px; }

    .msg-main { background:#fff; border:1px solid var(--border); border-radius:var(--radius-xl); display:flex; flex-direction:column; overflow:hidden; }
    .msg-header { display:flex; align-items:center; gap:12px; padding:16px 20px; border-bottom:1px solid var(--border); }
    .mh-avatar { width:40px; height:40px; border-radius:50%; object-fit:cover; }
    .mh-name { font-size:15px; font-weight:700; }
    .mh-sub { font-size:12px; color:var(--gray); }

    .msg-thread { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
    .msg-bubble { max-width:70%; padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.5; }
    .msg-bubble.recv { background:var(--surface); color:var(--dark); border-bottom-left-radius:4px; align-self:flex-start; }
    .msg-bubble.sent { background:var(--accent); color:#fff; border-bottom-right-radius:4px; align-self:flex-end; }
    .msg-time { font-size:10px; color:var(--light); margin-top:4px; }
    .msg-bubble.sent .msg-time { color:rgba(255,255,255,0.65); text-align:right; }

    .msg-input-bar { display:flex; gap:10px; padding:14px 16px; border-top:1px solid var(--border); align-items:flex-end; }
    .msg-input-bar textarea { flex:1; height:44px; padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--radius-lg); font-size:13px; resize:none; font-family:inherit; }
    .msg-input-bar textarea:focus { outline:none; border-color:var(--accent); }
    .msg-send-btn { height:44px; padding:0 18px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius-lg); font-size:13px; font-weight:700; cursor:pointer; transition:filter 0.2s; white-space:nowrap; }
    .msg-send-btn:hover { filter:brightness(1.08); }

    @media(max-width:768px) { .msg-layout { grid-template-columns:1fr; } .msg-sidebar { display:none; } }
  </style>
</head>
<body>
<div class="portal-layout">

  <header class="topbar">
    <div class="topbar-logo"><div class="topbar-logo-icon" style="background:#D97706">E</div>EduManage</div>
    <span class="topbar-spacer"></span>
    <button class="topbar-icon-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
        <div class="user-menu-wrap">
      <img src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=64&h=64&fit=crop&crop=face" alt="User" class="topbar-avatar" id="portalAvatarBtn" style="cursor:pointer" />
      <div class="user-dropdown" id="portalUserDropdown">
        <div class="ud-header"><div class="ud-name">Mrs. Mehta</div><div class="ud-role">Parent Portal</div></div>
        <a href="dashboard.html" class="ud-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard
        </a>
        <a href="profile.html" class="ud-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile
        </a>
        <a href="../login.html" class="ud-item logout" id="portalLogoutBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </a>
      </div>
    </div>

  </header>

  <div class="page-content">
    <div class="msg-layout">

      <!-- Left: Contact list -->
      <div class="msg-sidebar">
        <div class="msg-search">
          <input type="text" placeholder="Search messages…" />
        </div>
        <div class="msg-contact-list" id="contactList"></div>
      </div>

      <!-- Right: Conversation -->
      <div class="msg-main">
        <div class="msg-header">
          <img src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?w=40&h=40&fit=crop&crop=face" class="mh-avatar" alt="Teacher" />
          <div>
            <div class="mh-name">Rajesh Kumar</div>
            <div class="mh-sub">Mathematics · Class 10A</div>
          </div>
        </div>
        <div class="msg-thread" id="msgThread"></div>
        <div class="msg-input-bar">
          <textarea id="msgInput" placeholder="Type a message…"></textarea>
          <button class="msg-send-btn" id="msgSend">Send</button>
        </div>
      </div>

    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a>
    <a href="attendance.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Attendance</span></a>
    <a href="academics.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Grades</span></a>
    <a href="fees.html" class="bn-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><span>Fees</span><span class="bn-badge">!</span></a>
    <a href="messages.html" class="bn-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Messages</span></a>
  </nav>

</div>
<script>
const contacts = [
  { name:'Rajesh Kumar',  subject:'Mathematics',   cls:'10A', img:'https://images.unsplash.com/photo-1568602471122-7832951cc4c5?w=80&h=80&fit=crop&crop=face', last:'Raju performed well in today\'s test. Please ensure he completes…', time:'2:30 PM', unread:true },
  { name:'Priya Sharma',  subject:'Science',        cls:'10A', img:'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=80&h=80&fit=crop&crop=face', last:'The science exhibition project looks great so far…', time:'Yesterday', unread:false },
  { name:'Amit Verma',   subject:'English',         cls:'10A', img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&h=80&fit=crop&crop=face', last:'Please remind Raju to submit his essay by Friday.', time:'Mon', unread:false },
  { name:'Sunita Nair',  subject:'Social Studies',  cls:'10A', img:'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=80&h=80&fit=crop&crop=face', last:'Thank you for attending the PTM.', time:'Apr 1', unread:false },
];

const cl = document.getElementById('contactList');
contacts.forEach(c => {
  cl.innerHTML += `<div class="msg-contact${c.unread?' active':''}">
    <img src="${c.img}" alt="${c.name}" class="mc-avatar" />
    <div class="mc-info"><div class="mc-name">${c.name}</div><div class="mc-sub">${c.subject} · ${c.sub}</div></div>
    <div class="mc-meta"><div class="mc-time">${c.time}</div>${c.unread?'<div class="mc-unread"></div>':''}</div>
  </div>`;
});

const thread = document.getElementById('msgThread');
const messages = [
  { dir:'recv', text:'Good afternoon! I wanted to share that Raju performed very well in today\'s mathematics test. He scored 92/100.', time:'2:10 PM' },
  { dir:'sent', text:'That\'s wonderful to hear! Has he been improving consistently?', time:'2:15 PM' },
  { dir:'recv', text:'Yes, his performance has been steadily improving over the past month. Keep encouraging him to practice daily.', time:'2:20 PM' },
  { dir:'recv', text:'Please ensure he completes the homework exercises on page 45 by Friday.', time:'2:22 PM' },
  { dir:'sent', text:'Absolutely, we will make sure he does. Thank you for the update!', time:'2:25 PM' },
];
messages.forEach(m => {
  thread.innerHTML += `<div class="msg-bubble ${m.dir}"><div>${m.text}</div><div class="msg-time">${m.time}</div></div>`;
});
thread.scrollTop = thread.scrollHeight;

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  thread.innerHTML += `<div class="msg-bubble sent"><div>${text}</div><div class="msg-time">Just now</div></div>`;
  thread.scrollTop = thread.scrollHeight;
  input.value = '';
}
document.getElementById('msgSend').addEventListener('click', sendMessage);
document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>

<script>
(function(){
  var btn = document.getElementById("portalAvatarBtn");
  var dd  = document.getElementById("portalUserDropdown");
  if(!btn||!dd) return;
  btn.addEventListener("click", function(e){ e.stopPropagation(); dd.classList.toggle("open"); });
  document.addEventListener("click", function(){ dd.classList.remove("open"); });
  var logoutBtn = document.getElementById("portalLogoutBtn");
  if(logoutBtn) logoutBtn.addEventListener("click", function(e){
    e.preventDefault();
    if(confirm("Are you sure you want to log out?")) window.location.href="../login.html";
  });
})();
</script>
</body>
</html>
