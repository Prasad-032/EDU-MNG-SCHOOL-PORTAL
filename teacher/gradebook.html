<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradebook — EduManage Teacher</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
  <style>
    :root { --accent:#16A34A; --accent-s:#DCFCE7; --accent-h:#15803D; }
    .class-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .class-tab { padding:8px 16px; border-radius:9999px; border:1.5px solid var(--border); font-size:13px; font-weight:600; color:var(--gray); cursor:pointer; transition:all 0.2s; background:#fff; }
    .class-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .grade-input { width:60px; height:32px; border:1.5px solid var(--border); border-radius:6px; text-align:center; font-size:13px; font-weight:700; font-family:Inter,sans-serif; outline:none; transition:border-color 0.2s; }
    .grade-input:focus { border-color:var(--accent); }
    .grade-chip { display:inline-block; padding:2px 8px; border-radius:9999px; font-size:11px; font-weight:800; }
    .chip-a  { background:#DCFCE7; color:#16A34A; }
    .chip-b  { background:#DBEAFE; color:#1E40AF; }
    .chip-c  { background:#FEF3C7; color:#D97706; }
    .chip-f  { background:#FEE2E2; color:#DC2626; }
    .gb-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
    .gb-stat { background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px; text-align:center; }
    .gb-stat-n { font-size:22px; font-weight:800; }
    .gb-stat-l { font-size:11px; color:var(--gray); margin-top:3px; }
  </style>
</head>
<body>
<div class="portal-layout">
  <header class="topbar">
    <div class="topbar-logo"><div class="topbar-logo-icon">E</div>EduManage</div>
    <span class="topbar-spacer"></span>
    <button class="topbar-icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-badge">3</span></button>
    <div class="user-menu-wrap">
      <img src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?w=64&h=64&fit=crop&crop=face" alt="Teacher" class="topbar-avatar" id="portalAvatarBtn" />
      <div class="user-dropdown" id="portalUserDropdown">
        <div class="ud-header"><div class="ud-name">Mr. Rajesh Kumar</div><div class="ud-role">Mathematics Teacher</div></div>
        <a href="dashboard.html" class="ud-item"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
        <a href="profile.html" class="ud-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile
        </a>
        <a href="../login.html" class="ud-item logout" id="portalLogoutBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
      </div>
    </div>
  </header>

  <div class="page-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div><div style="font-size:20px;font-weight:800;color:var(--dark)">Gradebook</div><div style="font-size:13px;color:var(--gray);margin-top:2px">Term 2 · 2025–26</div></div>
      <select class="btn btn-outline" style="font-family:Inter,sans-serif;font-size:13px;cursor:pointer">
        <option>Unit Test 1</option><option>Unit Test 2</option><option>Mid Term</option><option>Final Exam</option>
      </select>
    </div>

    <div class="class-tabs">
      <button class="class-tab active">Class 10A</button>
      <button class="class-tab">Class 9B</button>
      <button class="class-tab">Class 8A</button>
      <button class="class-tab">Class 7C</button>
    </div>

    <div class="gb-stats">
      <div class="gb-stat"><div class="gb-stat-n" style="color:#16A34A">87%</div><div class="gb-stat-l">Class Average</div></div>
      <div class="gb-stat"><div class="gb-stat-n" style="color:#1E40AF">98</div><div class="gb-stat-l">Highest Score</div></div>
      <div class="gb-stat"><div class="gb-stat-n" style="color:#DC2626">42</div><div class="gb-stat-l">Lowest Score</div></div>
      <div class="gb-stat"><div class="gb-stat-n" style="color:#D97706">3</div><div class="gb-stat-l">Below 50%</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Class 10A — Unit Test 1 (Max: 100)</div>
        <button class="btn btn-outline btn-sm">Export CSV</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Student</th><th>Roll</th><th>Marks</th><th>Grade</th><th>Remarks</th></tr></thead>
          <tbody id="gradeTableBody"></tbody>
        </table>
      </div>
      <div style="padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px">
        <button class="btn btn-outline">Save Draft</button>
        <button class="btn btn-primary" id="saveGradesBtn">Save Grades</button>
      </div>
    </div>
  </div>

    <nav class="bottom-nav">
    <a href="dashboard.html" class="bn-item "><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Home</a>
    <a href="classes.html" class="bn-item "><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Classes</a>
    <a href="attendance.html" class="bn-item "><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Attendance</a>
    <a href="gradebook.html" class="bn-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Grades</a>
    <a href="assignments.html" class="bn-item "><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Assign.</a>
    <a href="messages.html" class="bn-item "><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Messages</a>
  </nav>
</div>
<script>
var students = [
  {name:'Raju Sharma',  roll:'01', img:'https://images.unsplash.com/photo-1529390079861-591de354faf5?w=40&h=40&fit=crop&crop=face', score:92},
  {name:'Priya Nair',   roll:'02', img:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=40&h=40&fit=crop&crop=face', score:88},
  {name:'Anita Roy',    roll:'03', img:'https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=40&h=40&fit=crop&crop=face', score:76},
  {name:'Karan Mehta',  roll:'04', img:'https://images.unsplash.com/photo-1519340241574-2cec6aef0c01?w=40&h=40&fit=crop&crop=face', score:65},
  {name:'Sunita Verma', roll:'05', img:'https://images.unsplash.com/photo-1497486751825-1233686d5d80?w=40&h=40&fit=crop&crop=face', score:98},
];
function getGrade(s){ if(s>=90)return['A+','chip-a']; if(s>=80)return['A','chip-a']; if(s>=70)return['B+','chip-b']; if(s>=60)return['B','chip-b']; if(s>=50)return['C','chip-c']; return['F','chip-f']; }
var tbody = document.getElementById('gradeTableBody');
students.forEach(function(s,i){
  var g=getGrade(s.score);
  tbody.innerHTML+='<tr>'
    +'<td style="color:var(--gray);font-size:12px">'+(i+1)+'</td>'
    +'<td><div style="display:flex;align-items:center;gap:8px"><img src="'+s.img+'" style="width:30px;height:30px;border-radius:50%;object-fit:cover"/><span style="font-weight:600">'+s.name+'</span></div></td>'
    +'<td style="color:var(--gray)">'+s.roll+'</td>'
    +'<td><input class="grade-input" type="number" min="0" max="100" value="'+s.score+'" onchange="updateGrade(this,'+i+')" /></td>'
    +'<td><span class="grade-chip '+g[1]+'" id="chip'+i+'">'+g[0]+'</span></td>'
    +'<td><input style="border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;font-family:Inter,sans-serif;outline:none;width:120px" placeholder="Optional…" /></td>'
    +'</tr>';
});
function updateGrade(inp,i){
  var s=parseInt(inp.value)||0;
  var g=getGrade(s);
  var chip=document.getElementById('chip'+i);
  chip.textContent=g[0]; chip.className='grade-chip '+g[1];
}
document.getElementById('saveGradesBtn').addEventListener('click',function(){
  this.textContent='✓ Saved!'; this.style.background='#16A34A'; this.disabled=true;
  setTimeout(function(){ document.getElementById('saveGradesBtn').textContent='Save Grades'; document.getElementById('saveGradesBtn').style.background=''; document.getElementById('saveGradesBtn').disabled=false; },2000);
});
document.querySelectorAll('.class-tab').forEach(function(t){
  t.addEventListener('click',function(){ document.querySelectorAll('.class-tab').forEach(function(x){x.classList.remove('active');}); t.classList.add('active'); });
});
(function(){
  var btn=document.getElementById('portalAvatarBtn'),dd=document.getElementById('portalUserDropdown');
  if(!btn||!dd)return;
  btn.addEventListener('click',function(e){e.stopPropagation();dd.classList.toggle('open');});
  document.addEventListener('click',function(){dd.classList.remove('open');});
  var lb=document.getElementById('portalLogoutBtn');
  if(lb)lb.addEventListener('click',function(e){e.preventDefault();if(confirm('Log out?'))window.location.href='../login.html';});
})();
</script>
</body>
</html>
