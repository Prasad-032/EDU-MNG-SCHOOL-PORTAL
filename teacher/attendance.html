<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance — EduManage Teacher</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
  <style>
    :root { --accent:#16A34A; --accent-s:#DCFCE7; --accent-h:#15803D; }
    .class-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .class-tab { padding:8px 16px; border-radius:9999px; border:1.5px solid var(--border); font-size:13px; font-weight:600; color:var(--gray); cursor:pointer; transition:all 0.2s; background:#fff; }
    .class-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
    .att-student-row { display:flex; align-items:center; gap:12px; padding:12px 18px; border-bottom:1px solid var(--border); }
    .att-student-row:last-child { border-bottom:none; }
    .att-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; flex-shrink:0; }
    .att-name { flex:1; font-size:13px; font-weight:600; color:var(--dark); }
    .att-roll { font-size:11px; color:var(--gray); }
    .att-btns { display:flex; gap:6px; }
    .att-btn { width:32px; height:32px; border-radius:8px; border:1.5px solid var(--border); background:#fff; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s; }
    .att-btn.p { border-color:var(--accent); color:var(--accent); }
    .att-btn.p.sel { background:var(--accent); color:#fff; }
    .att-btn.a { border-color:var(--red); color:var(--red); }
    .att-btn.a.sel { background:var(--red); color:#fff; }
    .att-btn.l { border-color:var(--orange); color:var(--orange); }
    .att-btn.l.sel { background:var(--orange); color:#fff; }
    .att-summary { display:flex; gap:12px; margin-bottom:16px; }
    .att-sum-card { flex:1; background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); padding:14px; text-align:center; }
    .att-sum-n { font-size:22px; font-weight:800; }
    .att-sum-l { font-size:11px; color:var(--gray); margin-top:3px; }
  </style>
</head>
<body>
<div class="portal-layout">
  <header class="topbar">
    <div class="topbar-logo"><div class="topbar-logo-icon">E</div>EduManage</div>
    <span class="topbar-spacer"></span>
    <button class="topbar-icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-badge">3</span></button>
    <div class="user-menu-wrap">
      <img src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?w=64&h=64&fit=crop&crop=face" alt="Teacher" class="topbar-avatar" id="portalAvatarBtn" />
      <div class="user-dropdown" id="portalUserDropdown">
        <div class="ud-header"><div class="ud-name">Mr. Rajesh Kumar</div><div class="ud-role">Mathematics Teacher</div></div>
        <a href="dashboard.html" class="ud-item"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
        <a href="profile.html" class="ud-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile
        </a>
        <a href="../login.html" class="ud-item logout" id="portalLogoutBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
      </div>
    </div>
  </header>

  <div class="page-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div><div style="font-size:20px;font-weight:800;color:var(--dark)">Mark Attendance</div><div style="font-size:13px;color:var(--gray);margin-top:2px">Tuesday, April 8, 2026</div></div>
      <input type="date" value="2026-04-08" class="btn btn-outline" style="font-family:Inter,sans-serif;font-size:13px;cursor:pointer" />
    </div>

    <div class="class-tabs">
      <button class="class-tab active">Class 10A (42)</button>
      <button class="class-tab">Class 9B (43)</button>
      <button class="class-tab">Class 8A (41)</button>
      <button class="class-tab">Class 7C (38)</button>
      <button class="class-tab">Class 6B (40)</button>
      <button class="class-tab">Class 11A (35)</button>
    </div>

    <div class="att-summary">
      <div class="att-sum-card"><div class="att-sum-n" style="color:#16A34A" id="presentCount">0</div><div class="att-sum-l">Present</div></div>
      <div class="att-sum-card"><div class="att-sum-n" style="color:#DC2626" id="absentCount">0</div><div class="att-sum-l">Absent</div></div>
      <div class="att-sum-card"><div class="att-sum-n" style="color:#D97706" id="lateCount">0</div><div class="att-sum-l">Late</div></div>
      <div class="att-sum-card"><div class="att-sum-n" style="color:#64748B" id="unmarkedCount">5</div><div class="att-sum-l">Unmarked</div></div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="card-header">
        <div class="card-title">Class 10A — 42 Students</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" onclick="markAll('p')">All Present</button>
          <button class="btn btn-outline btn-sm" onclick="markAll('a')">All Absent</button>
        </div>
      </div>
      <div id="studentList"></div>
      <div style="padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px">
        <button class="btn btn-outline">Save Draft</button>
        <button class="btn btn-primary" id="submitBtn">Submit Attendance</button>
      </div>
    </div>
  </div>

    <nav class="bottom-nav">
    <a href="dashboard.html" class="bn-item "><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Home</a>
    <a href="classes.html" class="bn-item "><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Classes</a>
    <a href="attendance.html" class="bn-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Attendance</a>
    <a href="gradebook.html" class="bn-item "><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Grades</a>
    <a href="assignments.html" class="bn-item "><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Assign.</a>
    <a href="messages.html" class="bn-item "><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Messages</a>
  </nav>
</div>
<script>
var students = [
  {name:'Raju Sharma',    roll:'01', img:'https://images.unsplash.com/photo-1529390079861-591de354faf5?w=40&h=40&fit=crop&crop=face'},
  {name:'Priya Nair',     roll:'02', img:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=40&h=40&fit=crop&crop=face'},
  {name:'Anita Roy',      roll:'03', img:'https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=40&h=40&fit=crop&crop=face'},
  {name:'Karan Mehta',    roll:'04', img:'https://images.unsplash.com/photo-1519340241574-2cec6aef0c01?w=40&h=40&fit=crop&crop=face'},
  {name:'Sunita Verma',   roll:'05', img:'https://images.unsplash.com/photo-1497486751825-1233686d5d80?w=40&h=40&fit=crop&crop=face'},
];
var list = document.getElementById('studentList');
students.forEach(function(s,i){
  list.innerHTML += '<div class="att-student-row" id="row'+i+'">'
    +'<img src="'+s.img+'" class="att-avatar" alt=""/>'
    +'<div class="att-name">'+s.name+'<div class="att-roll">Roll #'+s.roll+'</div></div>'
    +'<div class="att-btns">'
    +'<button class="att-btn p" onclick="markAtt(this,\'p\','+i+')">P</button>'
    +'<button class="att-btn a" onclick="markAtt(this,\'a\','+i+')">A</button>'
    +'<button class="att-btn l" onclick="markAtt(this,\'l\','+i+')">L</button>'
    +'</div></div>';
});
var status = {};
function updateSummary(){
  var p=0,a=0,l=0,u=0;
  students.forEach(function(_,i){ var s=status[i]; if(s==='p')p++; else if(s==='a')a++; else if(s==='l')l++; else u++; });
  document.getElementById('presentCount').textContent=p;
  document.getElementById('absentCount').textContent=a;
  document.getElementById('lateCount').textContent=l;
  document.getElementById('unmarkedCount').textContent=u;
}
function markAtt(btn,type,idx){
  var row=document.getElementById('row'+idx);
  row.querySelectorAll('.att-btn').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel');
  status[idx]=type;
  updateSummary();
}
function markAll(type){
  students.forEach(function(_,i){
    var row=document.getElementById('row'+i);
    row.querySelectorAll('.att-btn').forEach(function(b){b.classList.remove('sel');});
    row.querySelector('.att-btn.'+type).classList.add('sel');
    status[i]=type;
  });
  updateSummary();
}
document.getElementById('submitBtn').addEventListener('click',function(){
  this.textContent='✓ Submitted!';
  this.style.background='#16A34A';
  this.disabled=true;
});
document.querySelectorAll('.class-tab').forEach(function(t){
  t.addEventListener('click',function(){
    document.querySelectorAll('.class-tab').forEach(function(x){x.classList.remove('active');});
    t.classList.add('active');
  });
});
(function(){
  var btn=document.getElementById('portalAvatarBtn'),dd=document.getElementById('portalUserDropdown');
  if(!btn||!dd)return;
  btn.addEventListener('click',function(e){e.stopPropagation();dd.classList.toggle('open');});
  document.addEventListener('click',function(){dd.classList.remove('open');});
  var lb=document.getElementById('portalLogoutBtn');
  if(lb)lb.addEventListener('click',function(e){e.preventDefault();if(confirm('Log out?'))window.location.href='../login.html';});
})();
</script>
</body>
</html>
